<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>نتيجة تحليل المحاصيل</title>

    <style>
        body {
            font-family: Arial;
            background: #f3f3f3;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 90%;
            height: 90%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 15px;
        }

   
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
        }

        .logout-btn {
            background: #ff4d4d;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #e60000;
            transform: scale(1.05);
        }

        .container_img {
            display: flex;
            gap: 20px;
            text-align: center;
        }

        .image-box {
            width: 100%;
        }

        img {
            width: 90%;
            border-radius: 10px;
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            background: #2c7a4b;
            color: white;
            text-align: center;
            border-radius: 10px;
        }

        @media(max-width: 768px) {
            .container_img {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <!--  Top Bar with Logout -->
    <div class="top-bar">
        <div class="title">نتيجة تحليل المحاصيل </div>

        <a href="/logout" class="logout-btn" onclick="return confirm('هل تريد تسجيل الخروج؟')">
            ⎋ تسجيل الخروج
        </a>
    </div>

    <!-- Images -->
    <div class="container_img">

        <div class="image-box">
            <h4>الخريطة NDVI</h4>
            <img src="{{ url_for('static', filename='results/' + ndvi) }}">
        </div>

        <div class="image-box">
            <h4>الصورة الأصلية</h4>
            <img src="{{ url_for('static', filename='results/' + original) }}">
        </div>

    </div>
<!-- 
    <div>
        <p>Healthy: {{ healthy }}</p>
        <p>Medium: {{ medium }}</p>
        <p>Damaged: {{ damaged }}</p>
    </div> -->

    <div class="status">
        {% if healthy > medium and healthy > damaged %}
            محصول صحي 
        {% elif medium > healthy and medium > damaged %}
            محصول متوسط 
        {% else %}
            محصول متضرر 
        {% endif %}
    </div>

</div>

</body>
</html>
