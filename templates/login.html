
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>تسجيل الدخول</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <main class="page">

        <section class="form-wrapper">

            <form class="form-card"

                  action="/login"
                  method="POST">

                <h1 class="form-title">

                    تسجيل الدخول

                </h1>

                <label>

                    البريد الإلكتروني

                </label>

                <input
                    type="email"
                    name="email"
                    placeholder="example@email.com"
                    required
                >

                <label>

                    كلمة المرور

                </label>

                <input
                    type="password"
                    name="password"
                    placeholder="********"
                    required
                >

                <button type="submit"
                        class="btn">

                    دخول

                </button>

                <div class="register-link">

                    ليس لديك حساب ؟

                    <a href="/create-account">

                        إنشاء حساب جديد

                    </a>

                </div>

            </form>

        </section>

    </main>

</body>

</html>
